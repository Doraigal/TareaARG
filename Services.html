<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="Proyect">
            <div class="container-fluid mt-5 text-center mb-5 rounded-5 bg-gSuave">
                <div class="row mx-4 mb-4">
                    <h2 class="mt-5">Servicios</h2>
                    <div class="row mb-5 justify-content-center">
                        <div class="cartas col-md-4 mb-5 card">
                            <div></div>
                            <img src="img/Personalizados.png" alt="personalizadas" class="proyectos card-img">
                            <b class="card-body">
                                Impresiones
                                personalizadas</b>
                            <button class="btn btn-primary card-footer">Solicitar</button>
                        </div>
                        <div class="cartas col-md-4 mb-5 card">
                            <img src="img/Falcon.jpg" alt="Corte Laser" class="proyectos">
                            <b class="card-body">Corte Laser</b>
                            <button class="btn btn-primary card-footer">Solicitar</button>
                        </div>
                        <div class="cartas col-md-4 mb-5 card">
                            <img src="img/grabadoLaser.jpg" alt="Grabado Laser" class="proyectos mb-5">
                            <b class="card-body">Grabado Laser</b>
                            <button class="btn btn-primary card-footer">Solicitar</button>
                        </div>
                        <div class="cartas col-md-4 mb-5 card">
                            <img src="img/impresion3D.jpeg" alt="Impresion 3D" class="proyectos">
                            <b class="card-body">impresiones 3D</b>
                            <button class="btn btn-primary card-footer">Solicitar</button>
                        </div>
                    </div>
                    <!-- The map, centered at Uluru, Australia. -->
                    <gmp-map class="mb-4" center="9.886778289893275, -84.07576291257129" zoom="10" map-id="DEMO_MAP_ID" style="height: 600px; width: 1000px;">
                        <gmp-advanced-marker position="9.888090443176342, -84.07521425866545"
                            title="ARG Impresiones 3D, IA"></gmp-advanced-marker>
                    </gmp-map>
                </div>
            </div>
        </div>
</body>
</html>
