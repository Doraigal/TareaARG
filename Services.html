<body>

                </a>
                <div class="col-md-6 container-fluid justify-content-end">
                    <ul class="navbar-nav justify-content-end">
                        <li class="nav-item"><a class="nav-link" href="#DiseñosUnicos">Diseños Unicos</a></li>

                        <li class="nav-item"><a class="nav-link" href="Services.html">Servicios</a></li>
                        <li class="nav-item"><a class="nav-link" href="#AcercaDe">Acerca de</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="bg-gSuave">
        <div id="Proyect" class="m-0">
            <div class="container-fluid text-center">
                <div class="mx-4 mb-4 p-4">
                    <h2>Servicios</h2>
                    <div class="serProyectos row mb-5 justify-content-center">
                        <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#myModal">
                            Open modal
                        </button>

                    </div>
                </div>
            </div>
        </div>
        <div class="container mt-3">
            <h3>Modal Example</h3>
            <p>Click on the button to open the modal.</p>

            <button type="button" class="calc-modal-btn" data-bs-toggle="modal"
                    data-bs-target="#myModal">Calculadora</button>
        </div>

       <!-- The Modal -->
                <div class="modal" id="myModal" role="dialog">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">

                            <!-- Modal Header -->
                            <div class="modal-header">
                                <h4 class="modal-title">Calculadora</h4>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <!-- Modal body -->
                            <div class="modal-body">
                                <form name="calculator" class="calc">
                                    <input type="textfield" name="ans" class="ans" readonly value="">
                                    <br>
                                    <input type="textfield" name="res" class="res" readonly value="">
                                    <br>
                                    <select class="memoria" name="memoria" readonly id="mem">
                                        <option value="" selected>- Cálculos Realizados -</option>
                                    </select>
                                    <br>
                                    <input type="button" value="M"
                                        onclick="regMemoriaLocal(document.calculator.ans.value, document.calculator.res.value)">
                                    <input type="button" value="S"
                                        onclick="regMemoriaSesion(document.calculator.ans.value, document.calculator.res.value)">
                                    <input type="button" value="(" onclick="concatenaOperacion('(')">
                                    <input type="button" value=")" onclick="concatenaOperacion(')')">
                                    <br>
                                    <input type="button" value="P"
                                        onclick="funcionesEspeciales(document.calculator.res.value, 'P')">
                                    <input type="button" value="R"
                                        onclick="funcionesEspeciales(document.calculator.res.value, 'R')">
                                    <input type="button" value="L"
                                        onclick="funcionesEspeciales(document.calculator.res.value, 'L')">
                                    <input type="button" value="%" onclick="concatenaOperacion('%')">
                                    <br>
                                    <input type="button" value="1" onclick="concatenaOperacion('1')">
                                    <input type="button" value="2" onclick="concatenaOperacion('2')">
                                    <input type="button" value="3" onclick="concatenaOperacion('3')">
                                    <input type="button" value="+" onclick="concatenaOperacion('+')">
                                    <br>
                                    <input type="button" value="4" onclick="concatenaOperacion('4')">
                                    <input type="button" value="5" onclick="concatenaOperacion('5')">
                                    <input type="button" value="6" onclick="concatenaOperacion('6')">
                                    <input type="button" value="-" onclick="concatenaOperacion('-')">
                                    <br>
                                    <input type="button" value="7" onclick="concatenaOperacion('7')">
                                    <input type="button" value="8" onclick="concatenaOperacion('8')">
                                    <input type="button" value="9" onclick="concatenaOperacion('9')">
                                    <input type="button" value="*" onclick="concatenaOperacion('*')">
                                    <br>
                                    <input type="button" value="0" onclick="concatenaOperacion('0')">
                                    <input type="reset" value="C">
                                    <input type="button" value="/" onclick="concatenaOperacion('/')">
                                    <input type="button" value="="
                                        onclick="ejecutaExpresion(document.calculator.ans.value)">
                                </form>

                            </div>

                            <!-- Modal footer -->
                            <div class="modal-footer modal-footer-cemter">
                                <button type="button" class="calc-modal-btn" data-bs-dismiss="modal">Cerrar</button>
                            </div>

                        </div>
                    </div>
                </div>
    </main>

    <script src="assets/js/Proyectos.js"></script>
    

</body>
